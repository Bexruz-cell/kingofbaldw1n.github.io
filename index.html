<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Virtual Numbers Store</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
color:white;
min-height:100vh;
background:linear-gradient(#020617,#020617);
overflow-x:hidden;
}

/* Animated moon */
body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background:radial-gradient(circle,#f1f5f9 0%,#94a3b8 35%,transparent 65%);
border-radius:50%;
left:50%;
top:10%;
transform:translateX(-50%);
opacity:.18;
animation:moonMove 20s ease-in-out infinite alternate;
z-index:-2;
}

@keyframes moonMove{
0%{transform:translateX(-50%) translateY(0)}
100%{transform:translateX(-50%) translateY(30px)}
}

/* Mountains */
.mountains{
position:fixed;
bottom:0;
left:0;
width:100%;
height:40vh;
background:linear-gradient(to top,#020617 10%,transparent),
linear-gradient(135deg,#020617 30%,transparent 30%),
linear-gradient(225deg,#020617 30%,transparent 30%);
background-size:100% 100%,50% 100%,50% 100%;
background-position:0 0,0 0,100% 0;
background-repeat:no-repeat;
z-index:-1;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

header{text-align:center;margin-bottom:30px}

header h1{
font-size:42px;
font-weight:700;
letter-spacing:1px;
}

header p{
color:#94a3b8;
margin-top:8px;
}

.search{
max-width:400px;
margin:30px auto;
}

.search input{
width:100%;
padding:12px 16px;
border-radius:12px;
border:none;
background:#0f172a;
color:white;
font-size:14px;
outline:none;
}

.catalog{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:rgba(15,23,42,0.6);
border:1px solid rgba(255,255,255,0.05);
padding:20px;
border-radius:18px;
backdrop-filter:blur(10px);
transition:all .25s ease;
position:relative;
overflow:hidden;
}

.card::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.08),transparent);
opacity:0;
transition:.3s;
}

.card:hover::after{opacity:1}

.card:hover{
transform:translateY(-6px) scale(1.02);
box-shadow:0 20px 40px rgba(0,0,0,.5);
}

.country{
font-size:18px;
font-weight:600;
margin-bottom:6px;
}

.price{
color:#38bdf8;
font-weight:600;
margin-bottom:15px;
}

.btn{
display:inline-block;
width:100%;
padding:10px;
border-radius:10px;
text-align:center;
text-decoration:none;
font-weight:600;
background:linear-gradient(135deg,#38bdf8,#2563eb);
transition:.2s;
}

.btn:hover{
transform:scale(1.05);
}

/* floating telegram button */
.float{
position:fixed;
bottom:25px;
right:25px;
background:#229ED9;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
color:white;
box-shadow:0 10px 25px rgba(0,0,0,.5);
transition:.2s;
}

.float:hover{transform:scale(1.1)}

.admin{
margin-top:50px;
padding:20px;
background:#0f172a;
border-radius:16px;
}

.admin input{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
}

.admin button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#38bdf8;
font-weight:600;
cursor:pointer;
}

footer{
text-align:center;
margin-top:60px;
color:#94a3b8;
font-size:14px;
}

@media(max-width:768px){
header h1{font-size:28px}
}

</style></head><body><div class="mountains"></div><div class="container"><header>
<h1>Виртуальные номера Telegram</h1>
<p>Магазин номеров для регистрации</p>
</header><div class="search">
<input id="search" placeholder="Поиск страны...">
</div><div class="catalog" id="catalog"></div><div class="admin" id="admin" style="display:none">
<h3>Админ панель</h3>
<input id="country" placeholder="Страна">
<input id="price" placeholder="Цена">
<button onclick="addNumber()">Добавить</button>
</div><footer>
Напишите в Telegram чтобы проверить наличие номера
</footer></div><a class="float" href="https://t.me/Kingofbaldw1n">✈</a>

<script>

const numbers=[
{country:'🇳🇪 Нигер',price:'15000 сум'},
{country:'🇿🇦 Южная Африка',price:'15000 сум'},
{country:'🇮🇩 Индонезия',price:'15000 сум'},
{country:'🇨🇴 Колумбия',price:'15000 сум'},
{country:'🇵🇭 Филиппины',price:'15000 сум'},
{country:'🇹🇬 Того',price:'15000 сум'},
{country:'🇳🇦 Намибия',price:'15000 сум'},
{country:'🇨🇫 Центральноафриканская Республика',price:'15000 сум'},
{country:'🇨🇩 Конго Киншаса',price:'15000 сум'},
{country:'🇹🇿 Танзания',price:'15000 сум'}
]

function render(list){
const catalog=document.getElementById('catalog')
catalog.innerHTML=''

list.forEach(n=>{
const card=document.createElement('div')
card.className='card'
card.innerHTML=`
<div class="country">${n.country}</div>
<div class="price">${n.price}</div>
<a class="btn" href="https://t.me/Kingofbaldw1n">Купить</a>
`

catalog.appendChild(card)
})
}

render(numbers)

/* search */

document.getElementById('search').addEventListener('input',e=>{
const value=e.target.value.toLowerCase()

const filtered=numbers.filter(n=>
n.country.toLowerCase().includes(value)
)

render(filtered)
})

/* admin panel secret */

const urlParams=new URLSearchParams(window.location.search)

if(urlParams.get('admin')==='baldwin'){

document.getElementById('admin').style.display='block'
}

function addNumber(){

const country=document.getElementById('country').value
const price=document.getElementById('price').value

numbers.push({country,price})

render(numbers)
}

</script></body>
</html>
