<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kingofbaldw1n Stars</title>
  <meta name="description" content="Покупка звёзд через Telegram" />
  <style>
    :root{
      --bg1:#27484a;
      --bg2:#163036;
      --bg3:#0c1a20;
      --bg4:#071116;
      --panel:rgba(7,15,19,.62);
      --panel-border:rgba(255,255,255,.08);
      --text:#f5f7f7;
      --muted:#b6c2c2;
      --accent:#f3ecc0;
      --shadow:0 16px 40px rgba(0,0,0,.28);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      min-height:100vh;
      overflow-x:hidden;
      font-family:Inter,Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 24%,var(--bg3) 60%,var(--bg4) 100%);
      position:relative;
    }

    .scene{
      position:fixed;
      inset:0;
      z-index:0;
      overflow:hidden;
      pointer-events:none;
    }

    .stars-bg{
      position:absolute;
      inset:0;
      background-image:
        radial-gradient(circle at 8% 12%, rgba(255,255,255,.65) 0 1px, transparent 1.5px),
        radial-gradient(circle at 18% 8%, rgba(255,255,255,.45) 0 1px, transparent 1.5px),
        radial-gradient(circle at 28% 14%, rgba(255,255,255,.55) 0 1px, transparent 1.5px),
        radial-gradient(circle at 38% 9%, rgba(255,255,255,.55) 0 1px, transparent 1.5px),
        radial-gradient(circle at 49% 13%, rgba(255,255,255,.45) 0 1px, transparent 1.5px),
        radial-gradient(circle at 60% 7%, rgba(255,255,255,.55) 0 1px, transparent 1.5px),
        radial-gradient(circle at 72% 11%, rgba(255,255,255,.5) 0 1px, transparent 1.5px),
        radial-gradient(circle at 84% 8%, rgba(255,255,255,.4) 0 1px, transparent 1.5px),
        radial-gradient(circle at 93% 12%, rgba(255,255,255,.45) 0 1px, transparent 1.5px);
      opacity:.55;
    }

    .moon-wrap{
      position:absolute;
      left:50%;
      top:11%;
      width:min(72vw,560px);
      height:min(72vw,560px);
      transform:translateX(-50%);
      animation:moonMove 6.5s ease-in-out infinite;
    }

    .moon-glow{
      position:absolute;
      inset:0;
      border-radius:50%;
      background:radial-gradient(circle, rgba(246,239,198,.28) 0%, rgba(246,239,198,.12) 34%, rgba(246,239,198,.03) 60%, transparent 76%);
      filter:blur(12px);
    }

    .moon{
      position:absolute;
      left:50%;
      top:20%;
      transform:translateX(-50%);
      width:58%;
      height:58%;
      border-radius:50%;
      background:radial-gradient(circle at 50% 45%, #fbf9dd 0%, #efe7b7 58%, #d4cd9d 100%);
      box-shadow:
        0 0 40px rgba(246,239,198,.18),
        0 0 100px rgba(246,239,198,.08);
      opacity:.95;
    }

    @keyframes moonMove{
      0%,100%{ transform:translateX(-50%) translateY(0px); }
      50%{ transform:translateX(-50%) translateY(14px); }
    }

    .clouds{
      position:absolute;
      inset:0;
      opacity:.14;
      filter:blur(8px);
    }

    .cloud{
      position:absolute;
      background:rgba(255,255,255,.22);
      border-radius:999px;
      animation:cloudMove linear infinite;
    }

    .cloud::before,
    .cloud::after{
      content:"";
      position:absolute;
      background:inherit;
      border-radius:999px;
    }

    .cloud.c1{
      width:180px;
      height:50px;
      top:11%;
      left:-220px;
      animation-duration:34s;
    }
    .cloud.c1::before{ width:70px; height:70px; left:20px; top:-22px; }
    .cloud.c1::after{ width:90px; height:60px; right:20px; top:-15px; }

    .cloud.c2{
      width:230px;
      height:60px;
      top:18%;
      left:-280px;
      animation-duration:42s;
      animation-delay:-8s;
    }
    .cloud.c2::before{ width:90px; height:85px; left:26px; top:-26px; }
    .cloud.c2::after{ width:100px; height:70px; right:26px; top:-16px; }

    @keyframes cloudMove{
      from{ transform:translateX(0); }
      to{ transform:translateX(calc(100vw + 340px)); }
    }

    .shooting-stars{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    .shoot{
      position:absolute;
      width:180px;
      height:2px;
      background:linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.95), rgba(255,255,255,0));
      transform:rotate(-32deg);
      opacity:0;
      filter:drop-shadow(0 0 6px rgba(255,255,255,.6));
      animation:shooting 2.8s linear infinite;
    }

    .shoot.s1{ top:13%; left:78%; animation-delay:.2s; }
    .shoot.s2{ top:16%; left:42%; animation-delay:1.1s; }
    .shoot.s3{ top:21%; left:88%; animation-delay:1.9s; }

    @keyframes shooting{
      0%{ opacity:0; transform:translate(0,0) rotate(-32deg); }
      8%{ opacity:1; }
      30%{ opacity:0; transform:translate(-250px,180px) rotate(-32deg); }
      100%{ opacity:0; transform:translate(-250px,180px) rotate(-32deg); }
    }

    .mountain{
      position:absolute;
      left:0;
      width:100%;
      pointer-events:none;
    }

    .m1{
      bottom:33%;
      height:28%;
      background:#223a3e;
      clip-path:polygon(0% 100%,0% 60%,8% 40%,16% 54%,23% 30%,31% 58%,40% 36%,48% 61%,56% 30%,64% 51%,73% 24%,81% 47%,91% 31%,100% 56%,100% 100%);
    }

    .m2{
      bottom:22%;
      height:29%;
      background:#182d31;
      clip-path:polygon(0% 100%,0% 74%,10% 48%,19% 67%,29% 42%,38% 60%,48% 45%,57% 62%,67% 31%,76% 56%,86% 42%,94% 68%,100% 55%,100% 100%);
    }

    .m3{
      bottom:11%;
      height:26%;
      background:#102126;
      clip-path:polygon(0% 100%,0% 80%,9% 58%,20% 72%,31% 48%,43% 66%,54% 49%,65% 67%,76% 45%,87% 69%,100% 56%,100% 100%);
    }

    .river-wrap{
      position:absolute;
      left:50%;
      bottom:8%;
      width:min(26vw,220px);
      height:24%;
      transform:translateX(-50%);
      pointer-events:none;
    }

    .river{
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(191,233,228,.18), rgba(255,255,255,.02)),
        repeating-linear-gradient(165deg, rgba(255,255,255,.07) 0 10px, rgba(255,255,255,0) 10px 20px);
      clip-path:polygon(52% 0%,58% 8%,54% 17%,62% 29%,56% 38%,66% 48%,58% 58%,68% 68%,59% 79%,70% 100%,35% 100%,48% 82%,41% 67%,48% 54%,40% 41%,46% 28%,39% 15%,45% 0%);
      opacity:.8;
      animation:riverFlow 4s linear infinite;
    }

    .river-reflection{
      position:absolute;
      left:50%;
      top:0;
      width:48%;
      height:82%;
      transform:translateX(-50%);
      background:
        linear-gradient(180deg, rgba(255,248,210,.35), rgba(255,248,210,.1), rgba(255,248,210,0)),
        repeating-linear-gradient(180deg, rgba(255,255,255,.08) 0 8px, rgba(255,255,255,0) 8px 16px);
      clip-path:polygon(48% 0%,57% 6%,55% 16%,61% 28%,57% 40%,63% 51%,58% 64%,62% 78%,58% 100%,42% 100%,38% 80%,42% 63%,37% 50%,43% 37%,39% 22%,43% 8%);
      mix-blend-mode:screen;
      filter:blur(2px);
      opacity:.72;
      animation:reflectionMove 2.4s ease-in-out infinite;
    }

    @keyframes riverFlow{
      0%{ background-position:0 0, 0 0; }
      100%{ background-position:0 0, 0 100px; }
    }

    @keyframes reflectionMove{
      0%,100%{ transform:translateX(-50%) translateY(0px) scaleX(1); }
      50%{ transform:translateX(-50%) translateY(4px) scaleX(1.05); }
    }

    .forest{
      position:absolute;
      left:0;
      bottom:0;
      width:100%;
      height:16%;
      background:#050b0e;
      clip-path:polygon(
        0% 100%, 0% 88%, 3% 50%, 5% 86%, 7% 62%, 9% 92%, 12% 46%, 15% 88%,
        18% 56%, 21% 94%, 24% 44%, 27% 88%, 30% 58%, 33% 92%, 36% 48%, 39% 89%,
        42% 54%, 45% 95%, 48% 46%, 51% 89%, 54% 58%, 57% 93%, 60% 43%, 63% 90%,
        66% 55%, 69% 94%, 72% 47%, 75% 88%, 78% 57%, 81% 92%, 84% 45%, 87% 88%,
        90% 60%, 93% 94%, 96% 50%, 100% 88%, 100% 100%
      );
    }

    .forest-lights{
      position:absolute;
      left:0;
      bottom:6%;
      width:100%;
      height:10%;
      pointer-events:none;
    }

    .light{
      position:absolute;
      width:6px;
      height:6px;
      border-radius:50%;
      background:#f5ecc0;
      box-shadow:0 0 8px rgba(245,236,192,.7);
      animation:flicker 2.6s ease-in-out infinite;
      opacity:.7;
    }

    .light.l1{ left:14%; bottom:22%; animation-delay:.2s; }
    .light.l2{ left:22%; bottom:18%; animation-delay:1s; }
    .light.l3{ left:31%; bottom:24%; animation-delay:.6s; }
    .light.l4{ left:43%; bottom:19%; animation-delay:1.4s; }
    .light.l5{ left:58%; bottom:25%; animation-delay:.9s; }
    .light.l6{ left:67%; bottom:18%; animation-delay:1.8s; }
    .light.l7{ left:78%; bottom:24%; animation-delay:.4s; }
    .light.l8{ left:90%; bottom:19%; animation-delay:1.2s; }

    @keyframes flicker{
      0%,100%{ opacity:.45; transform:scale(.9); }
      50%{ opacity:1; transform:scale(1.1); }
    }

    .wrap{
      position:relative;
      z-index:2;
      width:min(1120px, calc(100% - 20px));
      margin:0 auto;
      padding:12px 0 24px;
    }

    .topbar{
      display:flex;
      align-items:center;
      padding:12px 14px;
      border-radius:20px;
      background:rgba(7,15,19,.52);
      border:1px solid rgba(255,255,255,.07);
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
      margin-bottom:14px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:900;
      letter-spacing:.2px;
    }

    .brand-logo{
      width:36px;
      height:36px;
      border-radius:12px;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.1);
      font-size:17px;
    }

    .main{
      display:grid;
      gap:14px;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--panel-border);
      border-radius:24px;
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
    }

    .hero{
      min-height:110px;
      display:grid;
      place-items:center;
      text-align:center;
      padding:18px 16px;
    }

    .hero h1{
      font-size:clamp(34px, 7vw, 62px);
      line-height:.95;
      letter-spacing:-1.4px;
      margin-bottom:6px;
    }

    .hero p{
      color:var(--muted);
      font-size:14px;
    }

    .cards{
      padding:18px;
    }

    .section-title{
      font-size:22px;
      font-weight:900;
      margin-bottom:14px;
      text-align:center;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:12px;
    }

    .card{
      padding:16px 12px;
      border-radius:20px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
      text-align:center;
    }

    .stars-count{
      font-size:28px;
      font-weight:900;
      color:var(--accent);
      margin-bottom:6px;
    }

    .sum{
      color:var(--muted);
      font-size:14px;
      margin-bottom:12px;
    }

    .buy-btn,
    .quick-btn,
    .control-btn,
    .order-btn{
      border:0;
      cursor:pointer;
      color:white;
      font-weight:800;
      background:rgba(255,255,255,.09);
      border:1px solid rgba(255,255,255,.1);
      backdrop-filter:blur(8px);
      transition:transform .18s ease, background .18s ease, opacity .18s ease;
    }

    .buy-btn:hover,
    .quick-btn:hover,
    .control-btn:hover,
    .order-btn:hover{
      transform:translateY(-2px);
    }

    .buy-btn:active,
    .quick-btn:active,
    .control-btn:active,
    .order-btn:active{
      transform:scale(1.04);
    }

    .buy-btn{
      min-height:44px;
      width:100%;
      border-radius:14px;
      font-size:14px;
    }

    .custom{
      padding:20px;
    }

    .custom-title{
      font-size:22px;
      font-weight:900;
      margin-bottom:14px;
      text-align:center;
    }

    .field-label{
      display:block;
      margin-bottom:8px;
      font-weight:800;
      font-size:14px;
      color:#eef3ea;
    }

    .field-row{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .control-btn{
      width:48px;
      height:48px;
      border-radius:14px;
      font-size:24px;
      flex-shrink:0;
    }

    .input{
      width:100%;
      min-height:52px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.07);
      color:white;
      text-align:center;
      font-size:22px;
      font-weight:900;
      outline:none;
      padding:10px 12px;
    }

    .input:focus{
      border-color:rgba(245,239,199,.3);
      box-shadow:0 0 0 4px rgba(245,239,199,.06);
    }

    .quick-list{
      margin-top:12px;
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:10px;
    }

    .quick-btn{
      min-height:42px;
      border-radius:12px;
      font-size:13px;
    }

    .summary{
      margin-top:16px;
      padding:16px;
      border-radius:20px;
      background:linear-gradient(180deg, rgba(245,239,199,.07), rgba(124,201,182,.05));
      border:1px solid rgba(255,255,255,.08);
      text-align:center;
    }

    .summary-label{
      color:var(--muted);
      font-size:13px;
      margin-bottom:6px;
    }

    .summary-price{
      font-size:clamp(28px, 5vw, 40px);
      font-weight:900;
      color:var(--accent);
      letter-spacing:-1px;
      margin-bottom:4px;
    }

    .summary-count{
      color:var(--muted);
      font-size:13px;
    }

    .order-btn{
      width:100%;
      min-height:52px;
      margin-top:16px;
      border-radius:16px;
      font-size:15px;
    }

    .error{
      min-height:16px;
      margin-top:8px;
      font-size:12px;
      color:#ffd0d8;
      text-align:center;
    }

    footer{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      padding-top:2px;
      padding-bottom:4px;
      position:relative;
      z-index:2;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%) translateY(20px);
      opacity:0;
      pointer-events:none;
      z-index:30;
      min-width:200px;
      text-align:center;
      padding:12px 16px;
      border-radius:14px;
      background:rgba(8,18,22,.94);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      font-weight:800;
      transition:all .25s ease;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    @media (max-width: 900px){
      .grid{
        grid-template-columns:repeat(2, 1fr);
      }

      .moon-wrap{
        top:10%;
        width:86vw;
        height:86vw;
      }

      .moon{
        top:22%;
        width:60%;
        height:60%;
      }

      .m1{ bottom:35%; height:22%; }
      .m2{ bottom:24%; height:23%; }
      .m3{ bottom:13%; height:21%; }
      .river-wrap{ width:32vw; height:20%; bottom:8%; }
      .forest{ height:14%; }
    }

    @media (max-width: 620px){
      .wrap{
        width:min(100% - 14px, 1120px);
      }

      .grid{
        grid-template-columns:1fr 1fr;
        gap:10px;
      }

      .cards,
      .custom{
        padding:14px;
      }

      .hero{
        min-height:90px;
        padding:14px;
      }

      .hero h1{
        font-size:clamp(30px, 10vw, 48px);
      }

      .stars-count{
        font-size:22px;
      }

      .sum{
        font-size:12px;
      }

      .buy-btn{
        min-height:40px;
        font-size:13px;
      }

      .quick-list{
        grid-template-columns:repeat(2, 1fr);
      }

      .control-btn{
        width:44px;
        height:44px;
      }

      .input{
        min-height:48px;
        font-size:20px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="stars-bg"></div>

    <div class="moon-wrap">
      <div class="moon-glow"></div>
      <div class="moon"></div>
    </div>

    <div class="clouds">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
    </div>

    <div class="shooting-stars">
      <div class="shoot s1"></div>
      <div class="shoot s2"></div>
      <div class="shoot s3"></div>
    </div>

    <div class="mountain m1"></div>
    <div class="mountain m2"></div>
    <div class="mountain m3"></div>

    <div class="river-wrap">
      <div class="river"></div>
      <div class="river-reflection"></div>
    </div>

    <div class="forest"></div>

    <div class="forest-lights">
      <div class="light l1"></div>
      <div class="light l2"></div>
      <div class="light l3"></div>
      <div class="light l4"></div>
      <div class="light l5"></div>
      <div class="light l6"></div>
      <div class="light l7"></div>
      <div class="light l8"></div>
    </div>
  </div>

  <div class="wrap">
    <header class="topbar">
      <div class="brand">
        <div class="brand-logo">⭐</div>
        <div>Kingofbaldw1n Stars</div>
      </div>
    </header>

    <main class="main">
      <section class="panel hero">
        <div>
          <h1>Stars</h1>
          <p>Быстрый заказ через Telegram</p>
        </div>
      </section>

      <section class="panel cards">
        <div class="section-title">Базовые</div>

        <div class="grid">
          <div class="card" data-stars="50">
            <div class="stars-count">50 ⭐</div>
            <div class="sum">14 250 сум</div>
            <button class="buy-btn" type="button">Купить</button>
          </div>

          <div class="card" data-stars="100">
            <div class="stars-count">100 ⭐</div>
            <div class="sum">28 500 сум</div>
            <button class="buy-btn" type="button">Купить</button>
          </div>

          <div class="card" data-stars="500">
            <div class="stars-count">500 ⭐</div>
            <div class="sum">142 500 сум</div>
            <button class="buy-btn" type="button">Купить</button>
          </div>

          <div class="card" data-stars="1000">
            <div class="stars-count">1000 ⭐</div>
            <div class="sum">285 000 сум</div>
            <button class="buy-btn" type="button">Купить</button>
          </div>

          <div class="card" data-stars="5000">
            <div class="stars-count">5000 ⭐</div>
            <div class="sum">1 425 000 сум</div>
            <button class="buy-btn" type="button">Купить</button>
          </div>

          <div class="card" data-stars="10000">
            <div class="stars-count">10000 ⭐</div>
            <div class="sum">2 850 000 сум</div>
            <button class="buy-btn" type="button">Купить</button>
          </div>
        </div>
      </section>

      <section class="panel custom">
        <div class="custom-title">Своё количество</div>

        <label class="field-label" for="starsInput">Количество</label>

        <div class="field-row">
          <button class="control-btn" id="minusBtn" type="button">−</button>
          <input
            class="input"
            id="starsInput"
            type="number"
            min="50"
            max="100000"
            step="1"
            value="50"
            inputmode="numeric"
            placeholder="Количество"
          />
          <button class="control-btn" id="plusBtn" type="button">+</button>
        </div>

        <div class="error" id="errorText"></div>

        <div class="quick-list">
          <button class="quick-btn" type="button" data-quick="50">50 ⭐</button>
          <button class="quick-btn" type="button" data-quick="100">100 ⭐</button>
          <button class="quick-btn" type="button" data-quick="500">500 ⭐</button>
          <button class="quick-btn" type="button" data-quick="1000">1000 ⭐</button>
        </div>

        <div class="summary">
          <div class="summary-label">Итого</div>
          <div class="summary-price" id="totalPrice">14 250 сум</div>
          <div class="summary-count" id="starsCount">50 ⭐</div>
        </div>

        <button class="order-btn" id="orderBtn" type="button">
          Купить
        </button>
      </section>
    </main>

    <footer>
      © 2026 Kingofbaldw1n Stars
    </footer>
  </div>

  <div class="toast" id="toast">Переход в Telegram...</div>

  <script>
    const PRICE_PER_STAR = 285;
    const MIN_STARS = 50;
    const MAX_STARS = 100000;
    const TELEGRAM_USERNAME = "Kingofbaldw1n";

    const starsInput = document.getElementById("starsInput");
    const minusBtn = document.getElementById("minusBtn");
    const plusBtn = document.getElementById("plusBtn");
    const totalPrice = document.getElementById("totalPrice");
    const starsCount = document.getElementById("starsCount");
    const orderBtn = document.getElementById("orderBtn");
    const toast = document.getElementById("toast");
    const errorText = document.getElementById("errorText");
    const quickButtons = document.querySelectorAll("[data-quick]");
    const presetCards = document.querySelectorAll(".card[data-stars]");

    function formatNumber(value){
      return new Intl.NumberFormat("ru-RU").format(value);
    }

    function sanitizeValue(value){
      if(!Number.isFinite(value)) return MIN_STARS;
      value = Math.floor(value);
      if(value < MIN_STARS) return MIN_STARS;
      if(value > MAX_STARS) return MAX_STARS;
      return value;
    }

    function currentValueRaw(){
      return Number(starsInput.value);
    }

    function showToast(text){
      toast.textContent = text;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1600);
    }

    function updateUI(showValidation = false){
      let raw = currentValueRaw();

      if(!Number.isFinite(raw) || starsInput.value.trim() === ""){
        totalPrice.textContent = "0 сум";
        starsCount.textContent = "—";

        if(showValidation){
          errorText.textContent = `Введите число от ${MIN_STARS} до ${MAX_STARS}.`;
        } else {
          errorText.textContent = "";
        }
        return;
      }

      if(raw < MIN_STARS){
        errorText.textContent = `Минимум ${MIN_STARS} ⭐`;
      } else if(raw > MAX_STARS){
        errorText.textContent = `Максимум ${MAX_STARS} ⭐`;
      } else {
        errorText.textContent = "";
      }

      const safe = sanitizeValue(raw);
      const total = safe * PRICE_PER_STAR;

      totalPrice.textContent = `${formatNumber(total)} сум`;
      starsCount.textContent = `${formatNumber(safe)} ⭐`;
    }

    function setStars(value){
      starsInput.value = sanitizeValue(value);
      updateUI();
    }

    function openTelegramOrder(stars){
      const safe = sanitizeValue(stars);
      const total = safe * PRICE_PER_STAR;
      const text = `Здравствуйте!\n${safe} ⭐\n${formatNumber(total)} сум`;
      const url = `https://t.me/${TELEGRAM_USERNAME}?text=${encodeURIComponent(text)}`;

      showToast("Переход в Telegram...");
      setTimeout(() => {
        window.open(url, "_blank");
      }, 180);
    }

    presetCards.forEach((card) => {
      const stars = Number(card.dataset.stars);
      const btn = card.querySelector(".buy-btn");
      btn.addEventListener("click", () => openTelegramOrder(stars));
    });

    minusBtn.addEventListener("click", () => {
      const value = sanitizeValue(currentValueRaw() || MIN_STARS);
      const next = value > 1000 ? value - 1000 : value - 1;
      setStars(next);
    });

    plusBtn.addEventListener("click", () => {
      const value = sanitizeValue(currentValueRaw() || MIN_STARS);
      const next = value >= 1000 ? value + 1000 : value + 1;
      setStars(next);
    });

    starsInput.addEventListener("input", () => {
      const cleaned = starsInput.value.replace(/[^0-9]/g, "");
      if(starsInput.value !== cleaned) starsInput.value = cleaned;
      updateUI(true);
    });

    starsInput.addEventListener("blur", () => {
      if(starsInput.value.trim() === ""){
        starsInput.value = MIN_STARS;
      } else {
        starsInput.value = sanitizeValue(Number(starsInput.value));
      }
      updateUI();
    });

    quickButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        setStars(Number(btn.dataset.quick));
      });
    });

    orderBtn.addEventListener("click", () => {
      let stars = currentValueRaw();

      if(!Number.isFinite(stars)){
        errorText.textContent = `Введите число от ${MIN_STARS} до ${MAX_STARS}.`;
        return;
      }

      stars = sanitizeValue(stars);
      starsInput.value = stars;
      updateUI();
      openTelegramOrder(stars);
    });

    updateUI();
  </script>
</body>
</html>
