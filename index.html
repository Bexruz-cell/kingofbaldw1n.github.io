<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingofbaldw1n Stars</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
color:white;
background:#0b1418;
}

/* SKY */

.sky{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background:linear-gradient(#28494a,#0c1a20);
overflow:hidden;
}

/* MOON */

.moon{
position:absolute;
top:10%;
left:50%;
transform:translateX(-50%);
width:180px;
height:180px;
border-radius:50%;
background:#f2eec4;
box-shadow:0 0 120px #f2eec4;
opacity:.9;
}

/* STARS */

.stars{
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:120px 120px;
opacity:.4;
}

/* MOUNTAINS */

.mountain1{
position:absolute;
bottom:35%;
width:100%;
height:40%;
background:#1c3538;
clip-path:polygon(
0 100%,0 60%,10% 40%,20% 60%,30% 30%,40% 60%,50% 35%,60% 65%,70% 30%,80% 60%,90% 40%,100% 60%,100% 100%);
}

.mountain2{
position:absolute;
bottom:20%;
width:100%;
height:40%;
background:#15282b;
clip-path:polygon(
0 100%,0 70%,15% 50%,30% 65%,45% 40%,60% 60%,75% 35%,90% 60%,100% 50%,100% 100%);
}

.mountain3{
position:absolute;
bottom:10%;
width:100%;
height:30%;
background:#0d1b1f;
clip-path:polygon(
0 100%,0 80%,20% 55%,40% 75%,60% 45%,80% 70%,100% 55%,100% 100%);
}

/* FOREST */

.forest{
position:absolute;
bottom:0;
width:100%;
height:28%;
background:#060f12;
clip-path:polygon(
0 100%,0 80%,5% 60%,10% 85%,15% 55%,20% 80%,25% 60%,30% 90%,35% 55%,40% 80%,45% 65%,50% 90%,55% 60%,60% 85%,65% 55%,70% 80%,75% 60%,80% 85%,85% 55%,90% 80%,95% 60%,100% 85%,100% 100%);
}

/* BIRDS */

.bird{
position:absolute;
width:20px;
height:2px;
background:white;
opacity:.7;
animation:fly 12s linear infinite;
}

.bird:before,
.bird:after{
content:"";
position:absolute;
width:10px;
height:2px;
background:white;
}

.bird:before{
transform:rotate(25deg);
left:-8px;
}

.bird:after{
transform:rotate(-25deg);
right:-8px;
}

@keyframes fly{
0%{left:-50px;top:20%}
100%{left:110%;top:25%}
}

/* MAIN */

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,.45);
backdrop-filter:blur(20px);
padding:35px;
border-radius:20px;
width:320px;
text-align:center;
}

/* FLOAT BUTTON EFFECT */

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin-top:15px;
background:rgba(255,255,255,.1);
color:white;
font-size:16px;
cursor:pointer;
transition:.2s;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-5px)}
}

button:active{
transform:scale(1.08);
}

input{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:14px;
text-align:center;
font-size:18px;
background:rgba(255,255,255,.1);
color:white;
}

.price{
margin-top:12px;
font-size:20px;
}

footer{
position:absolute;
bottom:10px;
width:100%;
text-align:center;
font-size:13px;
color:#9aa;
}

</style>
</head>

<body>

<div class="sky" id="sky">

<div class="stars"></div>
<div class="moon"></div>

<div class="mountain1"></div>
<div class="mountain2"></div>
<div class="mountain3"></div>

<div class="forest"></div>

<div class="bird" style="animation-delay:0s"></div>
<div class="bird" style="animation-delay:4s"></div>
<div class="bird" style="animation-delay:8s"></div>

</div>

<div class="container">

<h2>⭐ Stars</h2>

<input id="stars" type="number" placeholder="Количество">

<div class="price">
Итого: <span id="sum">0</span> сум
</div>

<button onclick="order()">Заказать</button>

</div>

<footer>
© 2026 Kingofbaldw1n Stars
</footer>

<script>

const price = 267
const min = 50
const max = 100000
const tg = "Kingofbaldw1n"

const input = document.getElementById("stars")
const sum = document.getElementById("sum")

input.addEventListener("input",()=>{

let val = Number(input.value)

if(val < min){
sum.innerText = 0
return
}

if(val > max){
val = max
input.value = max
}

sum.innerText = val * price

})

function order(){

let stars = Number(input.value)

if(stars < min){
alert("Минимум 50")
return
}

if(stars > max){
alert("Максимум 100000")
return
}

let total = stars * price

let text = `Здравствуйте! Хочу купить ${stars} ⭐. Сумма ${total} сум.`

let url = `https://t.me/${tg}?text=${encodeURIComponent(text)}`

window.open(url)

}

/* PARALLAX */

document.addEventListener("mousemove",(e)=>{

let x = (e.clientX / window.innerWidth - .5) * 20
let y = (e.clientY / window.innerHeight - .5) * 20

document.getElementById("sky").style.transform =
`translate(${x}px,${y}px)`

})

</script>

</body>
</html>
