<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Virtual Numbers Store</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
color:white;
min-height:100vh;
background:#020617;
overflow-x:hidden;
}

/* stars */
.stars{
position:fixed;
width:100%;
height:100%;
background:transparent;
z-index:-3;
}

.stars::after{
content:"";
position:absolute;
width:2px;
height:2px;
background:white;
box-shadow:
20vw 10vh white,
30vw 40vh white,
70vw 20vh white,
80vw 70vh white,
10vw 60vh white,
50vw 30vh white,
90vw 50vh white,
60vw 80vh white,
40vw 75vh white,
25vw 85vh white;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
0%{opacity:.3}
100%{opacity:1}
}

/* moon with parallax */
.moon{
position:fixed;
width:350px;
height:350px;
border-radius:50%;
background:radial-gradient(circle,#f1f5f9,#94a3b8);
left:50%;
top:10%;
transform:translateX(-50%);
opacity:.15;
filter:blur(1px);
z-index:-2;
animation:moonFloat 12s ease-in-out infinite alternate;
}

@keyframes moonFloat{
0%{transform:translate(-50%,0)}
100%{transform:translate(-50%,30px)}
}

/* mountains */
.mountains{
position:fixed;
bottom:0;
left:0;
width:100%;
height:40vh;
background:
linear-gradient(to top,#020617 10%,transparent),
linear-gradient(140deg,#020617 30%,transparent 30%),
linear-gradient(220deg,#020617 30%,transparent 30%);
background-size:100% 100%,50% 100%,50% 100%;
background-position:0 0,0 0,100% 0;
background-repeat:no-repeat;
z-index:-1;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

header{text-align:center;margin-bottom:30px}

header h1{
font-size:42px;
font-weight:700;
letter-spacing:1px;
}

header p{
color:#94a3b8;
margin-top:8px;
}

.search{
max-width:400px;
margin:30px auto;
}

.search input{
width:100%;
padding:12px 16px;
border-radius:12px;
border:none;
background:#0f172a;
color:white;
font-size:14px;
outline:none;
}

.catalog{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:rgba(15,23,42,0.6);
border:1px solid rgba(255,255,255,0.05);
padding:20px;
border-radius:18px;
backdrop-filter:blur(10px);
transition:all .25s ease;
position:relative;
overflow:hidden;
}

.card::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.08),transparent);
opacity:0;
transition:.3s;
}

.card:hover::after{opacity:1}

.card:hover{
transform:translateY(-6px) scale(1.02);
box-shadow:0 20px 40px rgba(0,0,0,.5);
}

.country{
font-size:18px;
font-weight:600;
margin-bottom:6px;
}

.price{
color:#38bdf8;
font-weight:600;
margin-bottom:15px;
}

.btn{
display:inline-block;
width:100%;
padding:10px;
border-radius:10px;
text-align:center;
text-decoration:none;
font-weight:600;
background:linear-gradient(135deg,#38bdf8,#2563eb);
transition:.2s;
}

.btn:hover{
transform:scale(1.05);
}

.float{
position:fixed;
bottom:25px;
right:25px;
background:#229ED9;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
color:white;
box-shadow:0 10px 25px rgba(0,0,0,.5);
transition:.2s;
}

.float:hover{transform:scale(1.1)}

footer{
text-align:center;
margin-top:60px;
color:#94a3b8;
font-size:14px;
}

@media(max-width:768px){
header h1{font-size:28px}
}

</style></head><body><div class="stars"></div>
<div class="moon"></div>
<div class="mountains"></div><div class="container"><header>
<h1>Виртуальные номера Telegram</h1>
<p>Магазин номеров для регистрации</p>
</header><div class="search">
<input id="search" placeholder="Поиск страны...">
</div><div class="catalog" id="catalog"></div><footer>
Напишите в Telegram чтобы проверить наличие номера</footer></div><a class="float" href="https://t.me/Kingofbaldw1n">✈</a>

<script>

const numbers=[
{country:'🇳🇪 Нигер',price:'15000 сум'},
{country:'🇿🇦 Южная Африка',price:'15000 сум'},
{country:'🇮🇩 Индонезия',price:'15000 сум'},
{country:'🇨🇴 Колумбия',price:'15000 сум'},
{country:'🇵🇭 Филиппины',price:'15000 сум'},
{country:'🇹🇬 Того',price:'15000 сум'},
{country:'🇳🇦 Намибия',price:'15000 сум'},
{country:'🇨🇫 Центральноафриканская Республика',price:'15000 сум'},
{country:'🇨🇩 Конго Киншаса',price:'15000 сум'},
{country:'🇹🇿 Танзания',price:'15000 сум'}
]

function render(list){
const catalog=document.getElementById('catalog')
catalog.innerHTML=''

list.forEach(n=>{
const card=document.createElement('div')
card.className='card'

const message=`Привет хочу купить номер ${n.country}`
const link=`https://t.me/Kingofbaldw1n?text=${encodeURIComponent(message)}`

card.innerHTML=`
<div class="country">${n.country}</div>
<div class="price">${n.price}</div>
<a class="btn" href="${link}">Купить</a>
`

catalog.appendChild(card)
})
}

render(numbers)

/* search */

document.getElementById('search').addEventListener('input',e=>{
const value=e.target.value.toLowerCase()

const filtered=numbers.filter(n=>
n.country.toLowerCase().includes(value)
)

render(filtered)
})

</script></body>
</html>
